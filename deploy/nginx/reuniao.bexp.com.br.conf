server {
    listen 80;
    server_name reuniao.bexp.com.br;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name reuniao.bexp.com.br;

    ssl_certificate /etc/letsencrypt/live/reuniao.bexp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reuniao.bexp.com.br/privkey.pem;

    # Importante: nao crie um location /api/ separado para outro backend
    # neste mesmo dominio. Isso quebraria /api/auth/* do NextAuth.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
